# Governance API — strips /api/governance prefix before forwarding
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auralis-ingress-governance
  namespace: auralis
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: "nginx"
  rules:
  - http:
      paths:
      - path: /api/governance(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: governance
            port:
              number: 8001
---
# Ingest API — strips /api/ingest prefix before forwarding
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auralis-ingress-ingest
  namespace: auralis
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: "nginx"
  rules:
  - http:
      paths:
      - path: /api/ingest(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: ingest
            port:
              number: 8000
---
# UI — catch-all, no rewrite (nginx handles SPA fallback internally)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auralis-ingress-ui
  namespace: auralis
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: "nginx"
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 80
