---
# UI — SPA catch-all, no rewrite
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auralis-ingress-ui
  namespace: auralis
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Redirect HTTP → HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: "nginx"
  tls:
  - hosts:
    - orgsense.in
    - www.orgsense.in
    secretName: auralis-tls
  rules:
  - host: orgsense.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 80
  - host: www.orgsense.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui
            port:
              number: 80
