# Governance API — strips /api/governance prefix before forwarding
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auralis-ingress-governance
  namespace: auralis
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: "nginx"
  tls:
  - hosts:
    - orgsense.in
    - www.orgsense.in
    secretName: auralis-tls
  rules:
  - host: orgsense.in
    http:
      paths:
      - path: /api/governance(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: governance
            port:
              number: 8001
  - host: www.orgsense.in
    http:
      paths:
      - path: /api/governance(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: governance
            port:
              number: 8001
---
