apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: auralis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
      - name: ingest
        image: asia-south1-docker.pkg.dev/project-2d37241a-3276-4c0d-b31/auralis/ingest:latest
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: auralis-env
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: auralis
spec:
  selector:
    app: ingest
  ports:
  - port: 8000
    targetPort: 8000
