server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────
    # In production (GKE) the ingress controller handles these rewrites.
    # Locally (docker-compose) nginx does it here so the production-built
    # SPA (relative /api/* paths) can reach the backend containers.

    # Use variables for upstream hostnames so nginx defers DNS resolution to
    # request time rather than startup. This allows the image to start cleanly
    # in Cloud Run (where these hostnames don't exist) — the LB routes /api/*
    # directly to backend Cloud Run services before reaching this container.
    # In local docker-compose these resolve normally at request time.
    location /api/governance/ {
        resolver 8.8.8.8 valid=10s ipv6=off;
        set $gov_upstream http://governance:8001;
        proxy_pass $gov_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        # Disable buffering for SSE (bi-agent/query, qa-agent/evaluate) streaming endpoints.
        # Without this, nginx buffers the entire SSE stream and the browser never receives chunks.
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/ingest/ {
        resolver 8.8.8.8 valid=10s ipv6=off;
        set $ingest_upstream http://ingest:8000;
        proxy_pass $ingest_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Static assets ──────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Health check ───────────────────────────────────────────────────────
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
