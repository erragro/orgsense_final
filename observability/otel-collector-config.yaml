receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    send_batch_size: 1024
    timeout: 5s
    send_batch_max_size: 2048

  # Enrich spans with k8s/host attributes if available
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

exporters:
  # Send traces to Jaeger via OTLP gRPC (requires COLLECTOR_OTLP_ENABLED=true)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Expose Prometheus-format metrics scraped from spans
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otelcol

  # Debug log exporter (low verbosity — logs span names only, no attributes)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
  telemetry:
    logs:
      level: warn
