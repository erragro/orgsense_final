global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: development
    project: kirana-kart

scrape_configs:
  - job_name: kirana-kart-governance
    static_configs:
      - targets: ["governance:8001"]
        labels:
          service: governance
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: kirana-kart-ingest
    static_configs:
      - targets: ["ingest:8000"]
        labels:
          service: ingest
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
    scrape_interval: 30s
