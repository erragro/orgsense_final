steps:
  - name: 'node:22-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'cd kirana_kart_ui && npm ci && npm run build'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - 'asia-south1-docker.pkg.dev/project-2d37241a-3276-4c0d-b31/auralis/ui:latest'
      - '-f'
      - 'kirana_kart_ui/Dockerfile'
      - 'kirana_kart_ui/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/project-2d37241a-3276-4c0d-b31/auralis/ui:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'ui'
      - '--image=asia-south1-docker.pkg.dev/project-2d37241a-3276-4c0d-b31/auralis/ui:latest'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--quiet'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: LEGACY
