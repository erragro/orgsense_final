services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: orgintelligence
      POSTGRES_USER: orguser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-REDACTED}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./kirana_kart/exports/kirana_kart_full_export_20260304_143135.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orguser -d orgintelligence"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7
    # Require password authentication — set REDIS_PASSWORD in .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-REDACTED} --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-REDACTED}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  weaviate:
    image: semitechnologies/weaviate:1.29.4
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      # Anonymous access disabled — require API key
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "${WEAVIATE_API_KEY:-REDACTED}"
      AUTHENTICATION_APIKEY_USERS: "kirana-kart-service"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  governance:
    build:
      context: ./kirana_kart
    command: uvicorn app.admin.main:app --host 0.0.0.0 --port 8001
    env_file:
      - ./kirana_kart/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: orgintelligence
      DB_USER: orguser
      DB_PASSWORD: ${DB_PASSWORD:-REDACTED}
      DB_SCHEMA: kirana_kart
      REDIS_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      WEAVIATE_HOST: weaviate
      WEAVIATE_HTTP_PORT: "8080"
      WEAVIATE_GRPC_PORT: "50051"
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-REDACTED}
      # ADMIN_TOKEN: set in .env — NEVER hardcode here
      LLM_API_BASE_URL: https://api.openai.com/v1
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      PROMETHEUS_ENABLED: "true"
      OTLP_ENDPOINT: "http://otel-collector:4317"
      SERVICE_NAME: "kirana-kart-governance"
      OTEL_SAMPLE_RATE: "0.1"
      DEPLOYMENT_ENV: development
      BI_DB_USER: bi_readonly
      BI_DB_PASSWORD: ${BI_DB_PASSWORD:-REDACTED}
      # JWT Auth — CHANGE IN PRODUCTION via .env
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-REDACTED}
      JWT_ACCESS_EXPIRE_MINUTES: "60"
      JWT_REFRESH_EXPIRE_DAYS: "30"
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@kirana.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-REDACTED}
      BOOTSTRAP_ADMIN_NAME: "Super Admin"
      OAUTH_REDIRECT_BASE_URL: http://localhost:8001
      FRONTEND_URL: http://localhost:5173
      # OAuth — set in .env
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      # PII Encryption key — set in .env
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      DATA_REGION: "IN"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  ingest:
    build:
      context: ./kirana_kart
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./kirana_kart/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: orgintelligence
      DB_USER: orguser
      DB_PASSWORD: ${DB_PASSWORD:-REDACTED}
      DB_SCHEMA: kirana_kart
      REDIS_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      WEAVIATE_HOST: weaviate
      WEAVIATE_HTTP_PORT: "8080"
      WEAVIATE_GRPC_PORT: "50051"
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-REDACTED}
      LLM_API_BASE_URL: https://api.openai.com/v1
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      PROMETHEUS_ENABLED: "true"
      OTLP_ENDPOINT: "http://otel-collector:4317"
      SERVICE_NAME: "kirana-kart-ingest"
      OTEL_SAMPLE_RATE: "0.1"
      DEPLOYMENT_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  worker-poll:
    build:
      context: ./kirana_kart
    command: python -m app.l4_agents.worker
    env_file:
      - ./kirana_kart/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: orgintelligence
      DB_USER: orguser
      DB_PASSWORD: ${DB_PASSWORD:-REDACTED}
      DB_SCHEMA: kirana_kart
      REDIS_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      LLM_API_BASE_URL: https://api.openai.com/v1
      WEAVIATE_HOST: weaviate
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      OTLP_ENDPOINT: "http://otel-collector:4317"
      SERVICE_NAME: "kirana-kart-worker-poll"
      OTEL_SAMPLE_RATE: "0.1"
      DEPLOYMENT_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ingest:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  worker-celery:
    build:
      context: ./kirana_kart
    command: celery -A app.l4_agents.worker.celery_app worker --loglevel=info --concurrency=2 --queues=cardinal
    env_file:
      - ./kirana_kart/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: orgintelligence
      DB_USER: orguser
      DB_PASSWORD: ${DB_PASSWORD:-REDACTED}
      DB_SCHEMA: kirana_kart
      REDIS_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-REDACTED}@redis:6379/1
      LLM_API_BASE_URL: https://api.openai.com/v1
      WEAVIATE_HOST: weaviate
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      OTLP_ENDPOINT: "http://otel-collector:4317"
      SERVICE_NAME: "kirana-kart-worker-celery"
      OTEL_SAMPLE_RATE: "0.1"
      DEPLOYMENT_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  ui:
    build:
      context: ./kirana_kart_ui
    environment:
      VITE_GOVERNANCE_API_URL: http://localhost:8001
      VITE_INGEST_API_URL: http://localhost:8000
    depends_on:
      governance:
        condition: service_healthy
      ingest:
        condition: service_healthy
    ports:
      - "5173:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Observability stack ───────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC — internal only
      - "127.0.0.1:4318:4318"   # OTLP HTTP — internal only
      - "127.0.0.1:8889:8889"   # Prometheus scrape endpoint — internal only
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI — localhost only
      - "127.0.0.1:14250:14250"  # gRPC — internal only
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"   # localhost only
    depends_on:
      - governance
      - ingest
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-REDACTED}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "false"  # set true behind HTTPS
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"   # localhost only
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  pgdata:
  weaviate_data:
  prometheus_data:
  grafana_data:
