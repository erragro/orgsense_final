name: Security Dependency Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: '0 8 * * 1'

jobs:
  backend-security-scan:
    name: Backend — pip-audit (Python CVE scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r kirana_kart/requirements.txt \
            --format json \
            -o security-audit-backend.json \
            --strict \
            --ignore-vuln GHSA-x485-q6qp-5h5m
        # GHSA-x485-q6qp-5h5m = pygments ReDoS — no upstream fix available (2026-03)

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-report
          path: security-audit-backend.json

  frontend-security-scan:
    name: Frontend — npm audit (Node.js CVE scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: kirana_kart_ui/package-lock.json

      - name: Install dependencies
        working-directory: kirana_kart_ui
        run: npm ci

      - name: Run npm audit
        working-directory: kirana_kart_ui
        run: |
          npm audit --audit-level=high --json > security-audit-frontend.json || true
          # Fail the job if HIGH or CRITICAL vulnerabilities are found
          npm audit --audit-level=high

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-report
          path: kirana_kart_ui/security-audit-frontend.json

  secret-scan:
    name: Secret Detection — detect hardcoded credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
